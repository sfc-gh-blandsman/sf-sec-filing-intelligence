# Agent Evaluation YAML Configuration
# ============================================================================
# This file documents the YAML structure generated by _WRITE_EVAL_CONFIG() SP.
# The SP generates a fresh YAML with a timestamped dataset_name for each run.
# Do NOT upload this file manually — the eval DAG task calls the SP automatically.
#
# Spec: https://docs.snowflake.com/en/user-guide/snowflake-cortex/cortex-agents-evaluations
# ============================================================================

# Example of generated YAML (dataset_name changes per run):

dataset:
  dataset_type: "CORTEX AGENT"
  table_name: "SEC_FILINGS.FILING_DATA.SEC_FILING_EVAL_DATASET"
  dataset_name: "SEC_FILING_EVAL_DS_20260523_120000"
  column_mapping:
    query_text: "INPUT_QUERY"
    ground_truth: "GROUND_TRUTH"

evaluation:
  agent_params:
    agent_name: "SEC_FILINGS.FILING_DATA.SEC_FILING_AGENT"
    agent_type: "CORTEX AGENT"
  run_params:
    label: "sec_filing_eval"
    description: "Evaluate SEC Filing Agent - 20260523_120000"
  source_metadata:
    type: "dataset"
    dataset_name: "SEC_FILING_EVAL_DS_20260523_120000"

metrics:
  - "answer_correctness"
  - "logical_consistency"
